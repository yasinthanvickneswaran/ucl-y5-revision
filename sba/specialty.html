<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SBA – UCL Y5</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<style>
.back-link { font-size: 0.8rem; color: var(--text2); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 1.25rem; }
.back-link:hover { color: var(--text); }

.mode-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
.mode-bar h2 { font-size: 1.1rem; font-weight: 700; flex: 1; }

/* SBA card */
.sba-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.q-num { font-size: 0.7rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.q-stem { font-size: 0.9rem; line-height: 1.6; margin-bottom: 1rem; }
.sba-options { list-style: none; display: flex; flex-direction: column; gap: 7px; margin-bottom: 0.75rem; }
.sba-options li { padding: 9px 13px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 0.83rem; cursor: pointer; transition: background 0.12s, border-color 0.12s; display: flex; gap: 8px; align-items: flex-start; }
.sba-options li .opt-letter { font-weight: 700; color: var(--text3); flex-shrink: 0; width: 14px; }
.sba-options li:hover:not(.locked) { background: var(--surface2); border-color: var(--border2); }
.sba-options li.correct { background: var(--green-bg); border-color: #63A822; color: var(--green); }
.sba-options li.correct .opt-letter { color: var(--green); }
.sba-options li.wrong   { background: var(--red-bg);   border-color: #e24b4a; color: var(--red); }
.sba-options li.wrong .opt-letter { color: var(--red); }
.sba-options li.reveal  { background: var(--green-bg); border-color: #63A822; color: var(--green); opacity: 0.7; }
.sba-options li.reveal .opt-letter { color: var(--green); }
.sba-explanation { display: none; font-size: 0.82rem; color: var(--text2); background: var(--surface2); border-left: 3px solid var(--purple); border-radius: 0 8px 8px 0; padding: 9px 13px; margin-top: 0.75rem; line-height: 1.6; }

/* Score banner */
#score-banner { display: none; background: var(--green-bg); border: 0.5px solid #63A822; border-radius: var(--radius-lg); padding: 1.25rem; text-align: center; margin-bottom: 1.5rem; }
#score-banner h2 { font-size: 1.5rem; color: var(--green); }
#score-banner p { color: var(--text2); font-size: 0.875rem; margin-top: 0.25rem; }

.empty-state { text-align: center; padding: 4rem 1rem; }
.empty-state h2 { font-size: 1rem; margin-bottom: 0.5rem; }
.empty-state p { color: var(--text2); font-size: 0.875rem; margin-bottom: 1.25rem; }
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="../index.html">UCL <span>Y5</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../timetable/index.html">Timetable</a></li>
      <li><a href="index.html" class="active">SBA Bank</a></li>
    </ul>
    <a class="nav-admin" href="../admin/index.html">⚙ Admin</a>
  </div>
</nav>

<div class="page">
  <a class="back-link" href="index.html">← All specialties</a>

  <div id="main-content"></div>
</div>

<div id="toast"></div>
<script src="../assets/js/shared.js"></script>
<script>
const params = new URLSearchParams(location.search);
const specId = params.get('id');
const spec = SPECIALTIES.find(s => s.id === specId);

if (!spec) {
  document.getElementById('main-content').innerHTML = '<div class="empty-state"><h2>Specialty not found</h2><a href="index.html" class="btn">Back to SBA bank</a></div>';
} else {
  document.title = spec.label + ' SBAs – UCL Y5';
  let questions = Store.getSBAs(specId);
  let score = 0;
  let answered = 0;
  let quizMode = false;

  function render() {
    questions = Store.getSBAs(specId);
    const mc = document.getElementById('main-content');

    if (!questions.length) {
      mc.innerHTML = `
        <div class="page-header"><h1>${spec.label}</h1><p>${spec.conditions} core conditions · <span class="tag tag-${spec.module}">${MODULE_LABELS[spec.module]}</span></p></div>
        <div class="empty-state">
          <h2>No SBAs yet for this specialty</h2>
          <p>Head to the Admin panel to add notes and generate questions with Claude.</p>
          <a href="../admin/index.html?spec=${specId}" class="btn btn-primary">Generate SBAs →</a>
        </div>`;
      return;
    }

    const tagHtml = `<span class="tag tag-${spec.module}">${MODULE_LABELS[spec.module]}</span>`;
    mc.innerHTML = `
      <div class="page-header">
        <h1>${spec.label}</h1>
        <p>${spec.conditions} core conditions · ${tagHtml}</p>
      </div>
      <div id="score-banner"><h2 id="score-text"></h2><p id="score-sub"></p></div>
      <div class="mode-bar">
        <h2>${questions.length} question${questions.length !== 1 ? 's' : ''}</h2>
        <button class="btn btn-primary" id="quiz-btn" onclick="startQuiz()">Start quiz mode</button>
        <button class="btn" onclick="window.location.href='../admin/index.html?spec=${specId}'">+ Add more</button>
      </div>
      <div id="q-list"></div>`;

    renderQuestions(false);
  }

  function renderQuestions(quiz) {
    const list = document.getElementById('q-list');
    list.innerHTML = '';
    score = 0; answered = 0;

    questions.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'sba-card';
      card.dataset.qi = qi;

      const letters = ['A','B','C','D','E'];
      const optsHtml = q.options.map((opt, oi) =>
        `<li data-oi="${oi}" onclick="answer(this,${qi},${oi})">
          <span class="opt-letter">${letters[oi]}.</span><span>${opt}</span>
        </li>`
      ).join('');

      card.innerHTML = `
        <div class="q-num">
          <span>Question ${qi+1} of ${questions.length}</span>
          ${quiz ? '' : `<div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="editQ(${qi})">Edit</button><button class="btn btn-sm btn-danger" onclick="deleteQ(${qi})">Delete</button></div>`}
        </div>
        <div class="q-stem">${q.stem}</div>
        <ul class="sba-options">${optsHtml}</ul>
        <div class="sba-explanation" id="exp-${qi}">${q.explanation || ''}</div>`;

      list.appendChild(card);
    });
  }

  function answer(li, qi, oi) {
    const card = document.querySelector(`[data-qi="${qi}"]`);
    const opts = card.querySelectorAll('.sba-options li');
    if (opts[0].classList.contains('locked')) return;
    opts.forEach(o => o.classList.add('locked'));

    const q = questions[qi];
    const correct = q.correct_index ?? q.correctIndex ?? 0;

    if (oi === correct) {
      li.classList.add('correct');
      if (quizMode) score++;
    } else {
      li.classList.add('wrong');
      opts[correct].classList.add('reveal');
    }

    const exp = document.getElementById('exp-' + qi);
    if (exp && exp.textContent.trim()) exp.style.display = 'block';

    answered++;
    if (quizMode && answered === questions.length) showScore();
  }

  function startQuiz() {
    quizMode = true;
    score = 0; answered = 0;
    document.getElementById('quiz-btn').textContent = 'Reset';
    document.getElementById('quiz-btn').onclick = resetQuiz;
    document.getElementById('score-banner').style.display = 'none';
    renderQuestions(true);
  }

  function resetQuiz() {
    quizMode = false;
    document.getElementById('quiz-btn').textContent = 'Start quiz mode';
    document.getElementById('quiz-btn').onclick = startQuiz;
    document.getElementById('score-banner').style.display = 'none';
    renderQuestions(false);
  }

  function showScore() {
    const banner = document.getElementById('score-banner');
    const pct = Math.round(score / questions.length * 100);
    document.getElementById('score-text').textContent = score + ' / ' + questions.length + ' (' + pct + '%)';
    const msg = pct >= 90 ? '🎯 Excellent — that\'s your target!' : pct >= 70 ? '👍 Good — review the ones you missed.' : '📖 Review this topic and try again.';
    document.getElementById('score-sub').textContent = msg;
    banner.style.display = 'block';
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function deleteQ(qi) {
    if (!confirm('Delete this question?')) return;
    questions.splice(qi, 1);
    Store.saveSBAs(specId, questions);
    showToast('Question deleted');
    render();
  }

  function editQ(qi) {
    const q = questions[qi];
    // Navigate to admin with the question data
    const enc = encodeURIComponent(JSON.stringify({ qi, q }));
    location.href = `../admin/index.html?spec=${specId}&edit=${enc}`;
  }

  render();
}
</script>
</body>
</html>
